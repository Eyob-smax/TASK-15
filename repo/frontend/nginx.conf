# HTTP endpoint for local compatibility; force HTTPS for all browser traffic.
server {
    listen 3000;
    server_name _;

    return 301 https://$host:3443$request_uri;
}

# HTTPS app endpoint.
server {
    listen 3443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/fitcommerce.crt;
    ssl_certificate_key /etc/nginx/ssl/fitcommerce.key;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass https://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_verify on;
        proxy_ssl_trusted_certificate /etc/nginx/backend-certs/server.crt;
        proxy_ssl_server_name on;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
